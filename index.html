<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#f8f9fa">
    <title>AI 聊天室</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card: rgba(255,255,255,0.85);
            --glass: rgba(255,255,255,0.7);
            --text: #2d2d2d;
            --text2: #888;
            --border: rgba(0,0,0,0.08);
            --accent: #c17f8b;
            --accent2: #e8b4bc;
            --user-bubble: linear-gradient(135deg, #c17f8b, #e0a8b0);
            --ai-bubble: #fff;
            --input-bg: rgba(0,0,0,0.03);
            --shadow: 0 2px 16px rgba(0,0,0,0.06);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            background-image: var(--wallpaper, none);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            content: '';
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(255,255,255,0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 0;
        }
        .app-container { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; }

        /* 顶部 */
        .top-bar {
            display:flex; align-items:center; padding:12px 16px;
            padding-top:max(12px, env(safe-area-inset-top));
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom:1px solid var(--border);
            gap:10px; z-index:10;
        }
        .menu-btn, .icon-btn {
            background:none; border:none; color:var(--text);
            font-size:1.4em; padding:8px; cursor:pointer;
            min-width:42px; min-height:42px;
            display:flex; align-items:center; justify-content:center;
            border-radius:50%; transition: background 0.2s;
        }
        .menu-btn:active, .icon-btn:active { background:rgba(0,0,0,0.05); }
        .top-bar-info { flex:1; min-width:0; }
        .current-persona-name { font-weight:600; font-size:0.95em; color:var(--text); }
        .world-status { font-size:0.7em; color:var(--accent); margin-top:1px; }

        /* 聊天区 */
        .chat-area {
            flex:1; overflow-y:auto; padding:16px 14px;
            display:flex; flex-direction:column; gap:8px;
            -webkit-overflow-scrolling:touch;
        }
        .empty-state { text-align:center; color:var(--text2); padding:40px 20px; margin:auto; }
        .empty-state .emoji { font-size:3.5em; margin-bottom:10px; }
        .empty-state p { font-size:0.9em; margin:2px 0; }

        .message { display:flex; gap:8px; max-width:85%; animation:fadeIn 0.35s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message-avatar {
            width:34px; height:34px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:1.1em; flex-shrink:0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message.user .message-avatar { background: var(--accent); }
        .message.ai .message-avatar { background: #fff; border: 2px solid #eee; }
        .message-bubble {
            padding:11px 15px; border-radius:20px; line-height:1.55;
            font-size:0.9em; word-wrap:break-word;
        }
        .message.user .message-bubble {
            background: var(--user-bubble);
            color: #fff; border-bottom-right-radius:6px;
            box-shadow: 0 4px 15px rgba(193,127,139,0.3);
        }
        .message.ai .message-bubble {
            background: var(--ai-bubble);
            border: 1px solid rgba(0,0,0,0.06);
            border-bottom-left-radius:6px;
            box-shadow: var(--shadow);
        }
        .message-bubble pre {
            background: rgba(0,0,0,0.04); padding:10px;
            border-radius:12px; overflow-x:auto; margin:6px 0; font-size:0.8em;
        }
        .message-bubble code { font-size:0.85em; color: var(--accent); }

        /* 打字 */
        .typing-indicator {
            display:none; align-self:flex-start;
            padding:12px 16px; background:#fff;
            border-radius:20px; border-bottom-left-radius:6px;
            box-shadow: var(--shadow); gap:4px;
        }
        .typing-indicator.active { display:flex; align-items:center; }
        .typing-dot {
            width:7px; height:7px; border-radius:50%;
            background: var(--accent2); animation:bounce 1.4s infinite;
        }
        .typing-dot:nth-child(2){animation-delay:0.2s;}
        .typing-dot:nth-child(3){animation-delay:0.4s;}
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-6px);opacity:1;} }

        /* 输入区 */
        .input-area {
            padding:10px 14px; padding-bottom:calc(10px + var(--safe-bottom));
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top:1px solid var(--border); z-index:10;
        }
        .input-row { display:flex; gap:8px; align-items:flex-end; }
        .chat-input {
            flex:1; padding:12px 18px;
            background: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius:24px; color:var(--text);
            font-size:0.9em; resize:none; min-height:44px; max-height:100px;
            font-family:inherit; transition: all 0.3s;
        }
        .chat-input:focus {
            outline:none; border-color: var(--accent);
            background: #fff; box-shadow: 0 0 0 3px rgba(193,127,139,0.1);
        }
        .send-btn {
            width:44px; height:44px; border-radius:50%;
            background: var(--accent); border:none; color:#fff;
            font-size:1.1em; cursor:pointer; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            box-shadow: 0 4px 15px rgba(193,127,139,0.35);
            transition: all 0.2s;
        }
        .send-btn:active { transform:scale(0.92); opacity:0.85; }
        .send-btn:disabled { opacity:0.4; transform:none; }

        /* 抽屉 */
        .drawer-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.4); z-index:100;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .drawer-overlay.open { opacity:1; pointer-events:auto; }
        .drawer {
            position:fixed; top:0; left:0; bottom:0; width:85%; max-width:340px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index:101; transform:translateX(-100%);
            transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
            display:flex; flex-direction:column;
            box-shadow: 4px 0 30px rgba(0,0,0,0.1);
        }
        .drawer.open { transform:translateX(0); }
        .drawer-header {
            padding:16px; padding-top:max(16px, env(safe-area-inset-top));
            text-align:center; border-bottom:1px solid var(--border);
        }
        .drawer-header h2 { font-size:1.1em; font-weight:700; color:var(--accent); letter-spacing:1px; }
        .drawer-tabs { display:flex; border-bottom:1px solid var(--border); }
        .drawer-tab {
            flex:1; padding:13px 6px; text-align:center; font-size:0.78em;
            color:var(--text2); background:none; border:none;
            border-bottom:2px solid transparent; cursor:pointer;
            font-weight:500; transition: all 0.2s;
        }
        .drawer-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }
        .drawer-content { flex:1; overflow-y:auto; padding:14px; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        /* 卡片 */
        .persona-card {
            background:#fff; border:1px solid var(--border);
            border-radius:14px; padding:14px; margin-bottom:8px;
            cursor:pointer; position:relative; box-shadow: 0 1px 4px rgba(0,0,0,0.03);
            transition: all 0.2s;
        }
        .persona-card:active { background:#fafafa; transform:scale(0.98); }
        .persona-card.active { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(193,127,139,0.1); }
        .persona-card .name { font-weight:600; font-size:0.9em; }
        .persona-card .desc { font-size:0.7em; color:var(--text2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .persona-card .delete-btn {
            position:absolute; top:10px; right:10px; width:22px; height:22px;
            border-radius:50%; background:#e74c3c; border:none;
            color:#fff; font-size:10px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            opacity:0.6; transition:opacity 0.2s;
        }
        .persona-card:active .delete-btn { opacity:1; }

        .wb-card {
            background:#fff; border:1px solid var(--border);
            border-radius:14px; padding:14px; margin-bottom:8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .wb-card .wb-name { font-weight:600; font-size:0.85em; }
        .wb-keywords { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
        .wb-keyword-tag {
            background: rgba(193,127,139,0.12); color:var(--accent);
            padding:3px 10px; border-radius:20px; font-size:0.68em; font-weight:500;
        }
        .wb-actions { margin-top:8px; display:flex; gap:6px; }

        .btn-sm {
            padding:6px 14px; border-radius:20px; border:none;
            font-size:0.7em; cursor:pointer; font-weight:500; transition: all 0.2s;
        }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-danger { background:#e74c3c; color:#fff; }
        .btn-outline { background:#fff; color:var(--text); border:1px solid var(--border); }

        .add-btn {
            width:100%; padding:13px; background:var(--accent); color:#fff;
            border:none; border-radius:25px; font-size:0.85em; cursor:pointer;
            margin-top:4px; font-weight:500; box-shadow: 0 4px 15px rgba(193,127,139,0.25);
            transition: all 0.2s;
        }
        .add-btn:active { transform:scale(0.97); opacity:0.9; }

        /* 设置 */
        .setting-group { margin-bottom:15px; }
        .setting-group label {
            display:block; font-size:0.7em; color:var(--text2);
            margin-bottom:5px; font-weight:600; letter-spacing:0.5px;
        }
        .setting-group input, .setting-group textarea, .setting-group select {
            width:100%; padding:10px 14px; background:#fff;
            border:1px solid var(--border); border-radius:12px;
            color:var(--text); font-size:0.85em; transition: all 0.2s;
        }
        .setting-group input:focus, .setting-group textarea:focus {
            outline:none; border-color:var(--accent);
            box-shadow: 0 0 0 3px rgba(193,127,139,0.08);
        }
        .setting-group textarea { resize:vertical; min-height:60px; }
        .fetch-models-btn {
            display:inline-flex; align-items:center; gap:4px;
            padding:8px 16px; background:#fff; border:1px solid var(--accent);
            color:var(--accent); border-radius:20px; font-size:0.75em;
            cursor:pointer; margin-top:6px; font-weight:500; transition: all 0.2s;
        }
        .fetch-models-btn:active { background:rgba(193,127,139,0.05); }
        .fetch-models-btn.loading { opacity:0.6; pointer-events:none; }
        .models-list {
            margin-top:8px; max-height:150px; overflow-y:auto;
            background:#fff; border-radius:12px; border:1px solid var(--border);
        }
        .model-option {
            padding:10px 14px; cursor:pointer; font-size:0.8em;
            border-bottom:1px solid var(--border); transition: background 0.15s;
        }
        .model-option:last-child { border-bottom:none; }
        .model-option:active { background:#f9f9f9; }
        .model-option.selected { color:var(--accent); font-weight:600; background:rgba(193,127,139,0.04); }

        /* 模态 */
        .full-modal {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(255,255,255,0.98); z-index:200;
            display:flex; flex-direction:column;
            transform:translateY(100%); transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
            padding-top:env(safe-area-inset-top);
        }
        .full-modal.open { transform:translateY(0); }
        .full-modal-header {
            display:flex; align-items:center; padding:14px 18px;
            border-bottom:1px solid var(--border); gap:12px;
        }
        .full-modal-header h3 { flex:1; font-size:1em; font-weight:600; }
        .full-modal-body { flex:1; overflow-y:auto; padding:18px; }
        .full-modal-footer {
            padding:14px 18px; padding-bottom:calc(14px + var(--safe-bottom));
            display:flex; gap:8px; border-top:1px solid var(--border);
        }
        .full-modal-footer button {
            flex:1; padding:13px; border-radius:25px; border:none;
            font-size:0.9em; cursor:pointer; font-weight:500; transition: all 0.2s;
        }
        .close-btn {
            background:none; border:none; color:var(--text);
            font-size:1.3em; padding:6px; cursor:pointer;
            min-width:40px; min-height:40px; border-radius:50%;
        }
        .close-btn:active { background:rgba(0,0,0,0.03); }

        /* Toast */
        .toast {
            position:fixed; top:50px; left:50%; transform:translateX(-50%);
            background:var(--text); color:#fff; padding:10px 22px;
            border-radius:25px; font-size:0.82em; z-index:300;
            animation:toastIn 0.3s, toastOut 0.3s 1.5s forwards;
            pointer-events:none; box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-20px);} }

        .empty-state .sub { font-size:0.75em; opacity:0.6; margin-top:6px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <div class="top-bar-info">
                <div class="current-persona-name" id="current-persona-name">💬 选择角色</div>
                <div class="world-status" id="world-status"></div>
            </div>
            <button class="icon-btn" onclick="clearChat()">🗑️</button>
        </div>
        <div class="chat-area" id="chat-area">
            <div class="empty-state">
                <div class="emoji">🌸</div>
                <p>打开菜单选择角色</p>
                <p class="sub">ins风聊天室 · 点击左上角开始</p>
            </div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea class="chat-input" id="chat-input" placeholder="说点什么吧..." rows="1"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header"><h2>✨ ins 聊天室</h2></div>
        <div class="drawer-tabs">
            <button class="drawer-tab active" data-tab="personas">👤 人设</button>
            <button class="drawer-tab" data-tab="worldbook">📖 世界书</button>
            <button class="drawer-tab" data-tab="settings">⚙️ 设置</button>
        </div>
        <div class="drawer-content">
            <div class="tab-panel active" id="tab-personas"><div id="persona-list"></div><button class="add-btn" onclick="openPersonaModal()">+ 创建新人设</button></div>
            <div class="tab-panel" id="tab-worldbook"><div id="worldbook-list"></div><button class="add-btn" onclick="openWorldbookModal()">+ 添加世界条目</button></div>
            <div class="tab-panel" id="tab-settings">
                <div class="setting-group"><label>API 端点</label><input type="text" id="api-endpoint" placeholder="https://api.deepseek.com/v1/chat/completions"></div>
                <div class="setting-group"><label>API 密钥</label><input type="password" id="api-key" placeholder="sk-..."></div>
                <div class="setting-group">
                    <label>模型名称</label>
                    <input type="text" id="model-name" placeholder="deepseek-chat">
                    <button class="fetch-models-btn" id="fetch-models-btn" onclick="fetchModels()">📡 拉取模型列表</button>
                    <div class="models-list" id="models-list" style="display:none;"></div>
                </div>
                <div class="setting-group"><label>壁纸 URL</label><input type="text" id="wallpaper-url" placeholder="留空使用纯色背景"></div>
                <div class="setting-group"><label>自定义气泡 CSS</label><textarea id="custom-bubble-css" placeholder=".message-bubble { ... }"></textarea></div>
                <button class="add-btn" onclick="applySettings()">💾 保存设置</button>
                <button class="add-btn" style="background:#e74c3c;margin-top:6px;" onclick="resetAll()">🗑️ 重置全部</button>
            </div>
        </div>
    </div>

    <div class="full-modal" id="persona-modal">
        <div class="full-modal-header"><button class="close-btn" onclick="closePersonaModal()">✕</button><h3 id="persona-modal-title">创建人设</h3></div>
        <div class="full-modal-body">
            <input type="hidden" id="persona-edit-id">
            <div class="setting-group"><label>人设名称</label><input type="text" id="persona-name" placeholder="例如：温柔学姐"></div>
            <div class="setting-group"><label>系统提示词</label><textarea id="persona-prompt" placeholder="定义角色性格、说话方式..." style="min-height:150px;"></textarea></div>
            <div class="setting-group"><label>头像 Emoji</label><input type="text" id="persona-avatar" value="🌸"></div>
        </div>
        <div class="full-modal-footer"><button class="btn-outline" onclick="closePersonaModal()">取消</button><button class="btn-primary" onclick="savePersona()">保存</button></div>
    </div>

    <div class="full-modal" id="worldbook-modal">
        <div class="full-modal-header"><button class="close-btn" onclick="closeWorldbookModal()">✕</button><h3 id="worldbook-modal-title">编辑世界条目</h3></div>
        <div class="full-modal-body">
            <input type="hidden" id="worldbook-edit-id">
            <div class="setting-group"><label>条目名称</label><input type="text" id="worldbook-name" placeholder="例如：咖啡馆"></div>
            <div class="setting-group"><label>触发关键词（逗号分隔）</label><input type="text" id="worldbook-keywords" placeholder="咖啡, 拿铁, 拉花"></div>
            <div class="setting-group"><label>世界观描述</label><textarea id="worldbook-content" placeholder="详细的世界观背景..." style="min-height:120px;"></textarea></div>
        </div>
        <div class="full-modal-footer"><button class="btn-outline" onclick="closeWorldbookModal()">取消</button><button class="btn-primary" onclick="saveWorldbook()">保存</button></div>
    </div>

    <script>
        const KEYS = { personas:'mc_p', worldbook:'mc_w', settings:'mc_s', messages:'mc_m', current:'mc_c' };
        function load(k,d){try{let v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
        function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

        const defP = [
            {id:'1',name:'温柔学姐',prompt:'你是一位温柔的学姐，说话轻声细语，喜欢用"呢"、"哦"结尾，会照顾对方的感受，偶尔会给出贴心的建议。',avatar:'🌸'},
            {id:'2',name:'咖啡馆老板',prompt:'你是一家街角咖啡馆的老板，性格随和温暖，喜欢和客人聊天，对咖啡有着深厚的热爱，说话时会不经意提到咖啡知识。',avatar:'☕'},
            {id:'3',name:'文艺少女',prompt:'你是一位热爱文学的文艺少女，说话带着诗意，喜欢引用诗句和电影台词，对生活中的小美好特别敏感。',avatar:'📚'}
        ];

        const defW = [
            {id:'1',name:'街角咖啡馆',keywords:['咖啡','拿铁','拉花','咖啡馆','老板'],content:'一家隐藏在巷子里的复古咖啡馆，暖黄灯光，木质桌椅，空气中弥漫着咖啡豆的香气。墙上挂满了老照片，角落里有台黑胶唱片机。'},
            {id:'2',name:'雨天的书店',keywords:['下雨','书店','书','阅读','窗外'],content:'雨天的小书店格外安静，窗外细雨绵绵，店内暖意融融。书架间弥漫着纸张的清香，偶尔传来翻书的声音。'}
        ];

        let personas = load(KEYS.personas, defP);
        let worldbook = load(KEYS.worldbook, defW);
        let settings = load(KEYS.settings, {apiEndpoint:'https://api.deepseek.com/v1/chat/completions',apiKey:'',modelName:'deepseek-chat',wallpaperUrl:'',customBubbleCSS:''});
        let curId = load(KEYS.current, null);
        let messages = load(KEYS.messages, {});

        function renderPersonas(){
            document.getElementById('persona-list').innerHTML = personas.map(p=>`
                <div class="persona-card ${p.id===curId?'active':''}" onclick="selectPersona('${p.id}')">
                    <button class="delete-btn" onclick="event.stopPropagation();delPersona('${p.id}')">×</button>
                    <div class="name">${p.avatar} ${p.name}</div>
                    <div class="desc">${p.prompt.substring(0,40)}...</div>
                </div>`).join('')||'<div style="text-align:center;color:#888;padding:20px;font-size:0.8em;">点击下方按钮创建</div>';
        }

        function renderWorldbook(){
            document.getElementById('worldbook-list').innerHTML = worldbook.map(w=>`
                <div class="wb-card">
                    <div class="wb-name">📖 ${w.name}</div>
                    <div class="wb-keywords">${w.keywords.map(k=>`<span class="wb-keyword-tag">${k}</span>`).join('')}</div>
                    <div class="wb-actions">
                        <button class="btn-sm btn-primary" onclick="openWbModal('${w.id}')">编辑</button>
                        <button class="btn-sm btn-danger" onclick="delWorldbook('${w.id}')">删除</button>
                    </div>
                </div>`).join('')||'<div style="text-align:center;color:#888;padding:20px;font-size:0.8em;">暂无世界书条目</div>';
        }

        function loadSettingsUI(){
            document.getElementById('api-endpoint').value=settings.apiEndpoint||'https://api.deepseek.com/v1/chat/completions';
            document.getElementById('api-key').value=settings.apiKey||'';
            document.getElementById('model-name').value=settings.modelName||'deepseek-chat';
            document.getElementById('wallpaper-url').value=settings.wallpaperUrl||'';
            document.getElementById('custom-bubble-css').value=settings.customBubbleCSS||'';
            applyWallpaper(); applyCustomCSS();
        }

        function applyWallpaper(){
            document.body.style.setProperty('--wallpaper', settings.wallpaperUrl?`url(${settings.wallpaperUrl})`:'none');
        }

        function applyCustomCSS(){
            let el=document.getElementById('cs'); if(!el){el=document.createElement('style');el.id='cs';document.head.appendChild(el);}
            el.textContent=settings.customBubbleCSS||'';
        }

        function selectPersona(id){curId=id;save(KEYS.current,id);renderPersonas();loadChat();updateHead();closeDrawer();}

        function updateHead(){
            let p=personas.find(x=>x.id===curId);
            document.getElementById('current-persona-name').textContent=p?`${p.avatar} ${p.name}`:'💬 选择角色';
            let msgs=messages[curId]||[];
            let recent=msgs.slice(-8).map(m=>m.content).join(' ').toLowerCase();
            let active=worldbook.filter(w=>w.keywords.some(k=>recent.includes(k.toLowerCase())));
            document.getElementById('world-status').textContent=active.length?`🌿 ${active.map(a=>a.name).join(', ')}`:'';
        }

        function loadChat(){
            let area=document.getElementById('chat-area');
            let msgs=messages[curId]||[];
            let p=personas.find(x=>x.id===curId);
            if(!msgs.length){area.innerHTML=`<div class="empty-state"><div class="emoji">${p?p.avatar:'🌸'}</div><p>${p?'和 '+p.name+' 开始对话吧':'选择角色开始聊天'}</p></div>`;return;}
            area.innerHTML=msgs.map(m=>{
                let av=m.role==='user'?'😊':(p?p.avatar:'🌸');
                return `<div class="message ${m.role}"><div class="message-avatar">${av}</div><div class="message-bubble">${fmt(m.content)}</div></div>`;
            }).join('');
            area.scrollTop=area.scrollHeight;
        }

        function fmt(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>');}

        function addMsg(role,content){
            if(!curId)return;
            if(!messages[curId])messages[curId]=[];
            messages[curId].push({role,content,time:Date.now()});
            if(messages[curId].length>100)messages[curId]=messages[curId].slice(-100);
            save(KEYS.messages,messages);loadChat();updateHead();
        }

        function getWbCtx(){
            if(!curId)return'';
            let msgs=messages[curId]||[];
            let recent=msgs.slice(-8).map(m=>m.content).join(' ').toLowerCase();
            let active=worldbook.filter(w=>w.keywords.some(k=>recent.includes(k.toLowerCase())));
            return active.length?'\n\n[世界观]\n'+active.map(a=>a.content).join('\n\n'):'';
        }

        async function sendMessage(){
            let input=document.getElementById('chat-input');
            let btn=document.getElementById('send-btn');
            let msg=input.value.trim();
            if(!msg)return;
            if(!curId){showToast('⚠️ 请先选择角色');return;}
            if(!settings.apiKey){showToast('⚠️ 请设置API密钥');return;}
            addMsg('user',msg);input.value='';input.style.height='auto';
            let typing=document.getElementById('typing-indicator');
            typing.classList.add('active');btn.disabled=true;
            document.getElementById('chat-area').scrollTop=document.getElementById('chat-area').scrollHeight;
            try{
                let persona=personas.find(p=>p.id===curId);
                let wbCtx=getWbCtx();
                let history=(messages[curId]||[]).map(m=>({role:m.role,content:m.content}));
                let msgs=[{role:'system',content:persona.prompt+wbCtx},...history.slice(-15)];
                let resp=await fetch(settings.apiEndpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},body:JSON.stringify({model:settings.modelName,messages:msgs,temperature:0.9,max_tokens:1500})});
                if(!resp.ok){let err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||'HTTP '+resp.status);}
                let data=await resp.json();
                addMsg('assistant',data.choices[0]?.message?.content||'(无响应)');
            }catch(e){addMsg('assistant','❌ '+e.message);}
            typing.classList.remove('active');btn.disabled=false;input.focus();
        }

        async function fetchModels(){
            let btn=document.getElementById('fetch-models-btn');
            let list=document.getElementById('models-list');
            let ep=document.getElementById('api-endpoint').value.trim();
            let key=document.getElementById('api-key').value.trim();

            if(!key){showToast('⚠️ 请先填API密钥');return;}

            let baseUrl=ep.replace(/\/chat\/completions\/?$/,'').replace(/\/v1\/?$/,'');
            let modelsUrl=baseUrl+'/v1/models';

            btn.classList.add('loading');btn.textContent='⏳ 加载中...';
            list.style.display='none';

            try{
                let resp=await fetch(modelsUrl,{headers:{'Authorization':'Bearer '+key}});
                if(!resp.ok)throw new Error('获取失败');
                let data=await resp.json();
                let models=data.data||[];
                list.innerHTML=models.map(m=>`
                    <div class="model-option ${m.id===settings.modelName?'selected':''}" onclick="selectModel('${m.id}')">
                        ${m.id} ${m.id===settings.modelName?'✓':''}
                    </div>`).join('');
                list.style.display='block';
                showToast(`✅ 找到 ${models.length} 个模型`);
            }catch(e){
                showToast('❌ 获取失败，请检查API端点和密钥');
            }
            btn.classList.remove('loading');btn.textContent='📡 拉取模型列表';
        }

        function selectModel(id){
            document.getElementById('model-name').value=id;
            document.getElementById('models-list').style.display='none';
            document.getElementById('models-list').innerHTML='';
            showToast('✅ 已选择: '+id);
        }

        function clearChat(){if(!curId)return;if(!confirm('清空当前聊天记录？'))return;delete messages[curId];save(KEYS.messages,messages);loadChat();showToast('✅ 已清空');}
        function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
        function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}

            document.getElementById('persona-edit-id').value=id||''
