<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a1a2e">
    <title>AI 聊天室</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --sidebar-bg: #16213e;
            --message-user-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --message-ai-bg: #2d2d44;
            --text-color: #e0e0e0;
            --text-secondary: #a0a0b0;
            --border-color: #3a3a5c;
            --input-bg: #2d2d44;
            --accent-color: #667eea;
            --danger-color: #e74c3c;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100dvh;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        body::before {
            content: '';
            position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(26,26,46,0.88);
            z-index: 0;
        }
        .app-container { position:relative; z-index:1; height:100%; display:flex; flex-direction:column; }
        .top-bar {
            display:flex; align-items:center; padding:12px 16px;
            padding-top:max(12px, env(safe-area-inset-top));
            background:rgba(22,33,62,0.95); backdrop-filter:blur(10px);
            border-bottom:1px solid #3a3a5c; gap:12px; z-index:10;
        }
        .menu-btn {
            background:none; border:none; color:#e0e0e0; font-size:1.5em;
            padding:8px; cursor:pointer; min-width:44px; min-height:44px;
            display:flex; align-items:center; justify-content:center; border-radius:12px;
        }
        .menu-btn:active { background:rgba(255,255,255,0.1); }
        .top-bar-info { flex:1; min-width:0; }
        .current-persona-name { font-weight:600; font-size:1em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .world-status { font-size:0.7em; color:#667eea; }
        .chat-area {
            flex:1; overflow-y:auto; padding:16px 12px;
            display:flex; flex-direction:column; gap:10px;
            -webkit-overflow-scrolling:touch;
        }
        .empty-state { text-align:center; color:#a0a0b0; padding:40px 20px; margin:auto; }
        .empty-state .emoji { font-size:3em; margin-bottom:12px; }
        .message { display:flex; gap:8px; max-width:85%; animation:fadeIn 0.3s; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message-avatar {
            width:32px; height:32px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:1em; flex-shrink:0; background:rgba(255,255,255,0.1);
        }
        .message-bubble {
            padding:10px 14px; border-radius:18px; line-height:1.5;
            font-size:0.9em; word-wrap:break-word;
        }
        .message.user .message-bubble {
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border-bottom-right-radius:6px;
        }
        .message.ai .message-bubble {
            background:#2d2d44; border-bottom-left-radius:6px;
        }
        .typing-indicator {
            display:none; align-self:flex-start;
            padding:10px 16px; background:#2d2d44;
            border-radius:18px; border-bottom-left-radius:6px;
        }
        .typing-indicator.active { display:flex; gap:4px; align-items:center; }
        .typing-dot { width:7px; height:7px; border-radius:50%; background:#a0a0b0; animation:bounce 1.4s infinite; }
        .typing-dot:nth-child(2){animation-delay:0.2s;}
        .typing-dot:nth-child(3){animation-delay:0.4s;}
        @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4;} 30%{transform:translateY(-6px);opacity:1;} }
        .input-area {
            padding:10px 12px; padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
            background:rgba(22,33,62,0.95); backdrop-filter:blur(10px);
            border-top:1px solid #3a3a5c; z-index:10;
        }
        .input-row { display:flex; gap:8px; align-items:flex-end; }
        .chat-input {
            flex:1; padding:10px 16px; background:#2d2d44;
            border:1px solid #3a3a5c; border-radius:22px; color:#e0e0e0;
            font-size:0.9em; resize:none; min-height:42px; max-height:100px;
            font-family:inherit;
        }
        .chat-input:focus { outline:none; border-color:#667eea; }
        .send-btn {
            width:42px; height:42px; border-radius:50%;
            background:#667eea; border:none; color:white;
            font-size:1.1em; cursor:pointer; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
        }
        .send-btn:active { transform:scale(0.95); opacity:0.8; }
        .send-btn:disabled { opacity:0.4; }
        .drawer-overlay {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(0,0,0,0.6); z-index:100;
            opacity:0; pointer-events:none; transition:opacity 0.3s;
        }
        .drawer-overlay.open { opacity:1; pointer-events:auto; }
        .drawer {
            position:fixed; top:0; left:0; bottom:0; width:85%; max-width:360px;
            background:#16213e; z-index:101;
            transform:translateX(-100%); transition:transform 0.3s;
            display:flex; flex-direction:column;
        }
        .drawer.open { transform:translateX(0); }
        .drawer-header {
            padding:16px; padding-top:max(16px, env(safe-area-inset-top));
            text-align:center; border-bottom:1px solid #3a3a5c;
        }
        .drawer-header h2 {
            font-size:1.2em; background:linear-gradient(135deg,#667eea,#764ba2);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .drawer-tabs { display:flex; border-bottom:1px solid #3a3a5c; }
        .drawer-tab {
            flex:1; padding:12px 8px; text-align:center; font-size:0.8em;
            color:#a0a0b0; background:none; border:none;
            border-bottom:2px solid transparent; cursor:pointer;
        }
        .drawer-tab.active { color:#667eea; border-bottom-color:#667eea; }
        .drawer-content { flex:1; overflow-y:auto; padding:12px; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }
        .persona-card {
            background:#2d2d44; border:1px solid #3a3a5c;
            border-radius:12px; padding:12px; margin-bottom:8px;
            cursor:pointer; position:relative;
        }
        .persona-card:active { background:#35355a; }
        .persona-card.active { border-color:#667eea; box-shadow:0 0 12px rgba(102,126,234,0.2); }
        .persona-card .name { font-weight:600; font-size:0.9em; }
        .persona-card .desc { font-size:0.7em; color:#a0a0b0; margin-top:2px; }
        .persona-card .delete-btn {
            position:absolute; top:8px; right:8px; width:24px; height:24px;
            border-radius:50%; background:#e74c3c; border:none;
            color:white; font-size:12px; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
        }
        .wb-card {
            background:#2d2d44; border:1px solid #3a3a5c;
            border-radius:12px; padding:12px; margin-bottom:8px;
        }
        .wb-card .wb-name { font-weight:600; font-size:0.85em; }
        .wb-keywords { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
        .wb-keyword-tag {
            background:#667eea; color:white; padding:2px 8px;
            border-radius:10px; font-size:0.65em;
        }
        .wb-actions { margin-top:8px; display:flex; gap:6px; }
        .btn-sm { padding:6px 12px; border-radius:8px; border:none; font-size:0.7em; cursor:pointer; }
        .btn-primary { background:#667eea; color:white; }
        .btn-danger { background:#e74c3c; color:white; }
        .btn-secondary { background:#2d2d44; color:#e0e0e0; border:1px solid #3a3a5c; }
        .add-btn {
            width:100%; padding:12px; background:#667eea; color:white;
            border:none; border-radius:10px; font-size:0.85em; cursor:pointer; margin-top:4px;
        }
        .add-btn:active { opacity:0.8; }
        .setting-group { margin-bottom:16px; }
        .setting-group label {
            display:block; font-size:0.7em; color:#a0a0b0;
            margin-bottom:4px; font-weight:600;
        }
        .setting-group input, .setting-group textarea {
            width:100%; padding:10px 12px; background:#2d2d44;
            border:1px solid #3a3a5c; border-radius:10px;
            color:#e0e0e0; font-size:0.85em;
        }
        .setting-group textarea { resize:vertical; min-height:60px; }
        .full-modal {
            position:fixed; top:0; left:0; right:0; bottom:0;
            background:#16213e; z-index:200;
            display:flex; flex-direction:column;
            transform:translateY(100%); transition:transform 0.3s;
            padding-top:env(safe-area-inset-top);
        }
        .full-modal.open { transform:translateY(0); }
        .full-modal-header {
            display:flex; align-items:center; padding:12px 16px;
            border-bottom:1px solid #3a3a5c; gap:12px;
        }
        .full-modal-header h3 { flex:1; font-size:1em; }
        .full-modal-body { flex:1; overflow-y:auto; padding:16px; }
        .full-modal-footer {
            padding:12px 16px; padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
            display:flex; gap:8px; border-top:1px solid #3a3a5c;
        }
        .full-modal-footer button { flex:1; padding:12px; border-radius:10px; border:none; font-size:0.9em; cursor:pointer; }
        .close-btn {
            background:none; border:none; color:#e0e0e0; font-size:1.3em;
            padding:8px; cursor:pointer; min-width:44px; min-height:44px;
        }
        .toast {
            position:fixed; top:60px; left:50%; transform:translateX(-50%);
            background:#2ecc71; color:white; padding:10px 20px;
            border-radius:20px; font-size:0.85em; z-index:300;
            animation:toastIn 0.3s, toastOut 0.3s 1.5s forwards;
            pointer-events:none;
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateX(-50%) translateY(-20px);} }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-bar">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <div class="top-bar-info">
                <div class="current-persona-name" id="current-persona-name">👤 选择角色开始对话</div>
                <div class="world-status" id="world-status"></div>
            </div>
            <button class="menu-btn" onclick="clearChat()">🗑️</button>
        </div>
        <div class="chat-area" id="chat-area">
            <div class="empty-state"><div class="emoji">💬</div><p>打开菜单选择角色</p></div>
        </div>
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea class="chat-input" id="chat-input" placeholder="输入消息..." rows="1"></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header"><h2>✨ AI 聊天室</h2></div>
        <div class="drawer-tabs">
            <button class="drawer-tab active" data-tab="personas">👤 人设</button>
            <button class="drawer-tab" data-tab="worldbook">📖 世界书</button>
            <button class="drawer-tab" data-tab="settings">⚙️ 设置</button>
        </div>
        <div class="drawer-content">
            <div class="tab-panel active" id="tab-personas"><div id="persona-list"></div><button class="add-btn" onclick="openPersonaModal()">+ 创建新人设</button></div>
            <div class="tab-panel" id="tab-worldbook"><div id="worldbook-list"></div><button class="add-btn" onclick="openWorldbookModal()">+ 添加世界条目</button></div>
            <div class="tab-panel" id="tab-settings">
                <div class="setting-group"><label>API 端点</label><input type="text" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions"></div>
                <div class="setting-group"><label>API 密钥</label><input type="password" id="api-key" placeholder="sk-..."></div>
                <div class="setting-group"><label>模型名称</label><input type="text" id="model-name" placeholder="gpt-3.5-turbo"></div>
                <div class="setting-group"><label>壁纸 URL</label><input type="text" id="wallpaper-url" placeholder="留空使用默认"></div>
                <div class="setting-group"><label>自定义气泡 CSS</label><textarea id="custom-bubble-css"></textarea></div>
                <button class="add-btn" onclick="applySettings()">💾 保存设置</button>
                <button class="add-btn" style="background:#e74c3c;margin-top:6px;" onclick="resetAll()">🗑️ 重置全部数据</button>
            </div>
        </div>
    </div>
    <div class="full-modal" id="persona-modal">
        <div class="full-modal-header"><button class="close-btn" onclick="closePersonaModal()">✕</button><h3 id="persona-modal-title">创建人设</h3></div>
        <div class="full-modal-body">
            <input type="hidden" id="persona-edit-id">
            <div class="setting-group"><label>人设名称</label><input type="text" id="persona-name" placeholder="例如：傲娇猫娘"></div>
            <div class="setting-group"><label>系统提示词</label><textarea id="persona-prompt" placeholder="定义角色性格、说话方式..." style="min-height:150px;"></textarea></div>
            <div class="setting-group"><label>头像 Emoji</label><input type="text" id="persona-avatar" value="🤖"></div>
        </div>
        <div class="full-modal-footer"><button class="btn-secondary" onclick="closePersonaModal()">取消</button><button class="btn-primary" onclick="savePersona()">保存</button></div>
    </div>
    <div class="full-modal" id="worldbook-modal">
        <div class="full-modal-header"><button class="close-btn" onclick="closeWorldbookModal()">✕</button><h3 id="worldbook-modal-title">编辑世界条目</h3></div>
        <div class="full-modal-body">
            <input type="hidden" id="worldbook-edit-id">
            <div class="setting-group"><label>条目名称</label><input type="text" id="worldbook-name" placeholder="例如：赛博朋克都市"></div>
            <div class="setting-group"><label>触发关键词（逗号分隔）</label><input type="text" id="worldbook-keywords" placeholder="霓虹灯, 义体, 黑客"></div>
            <div class="setting-group"><label>世界观描述</label><textarea id="worldbook-content" placeholder="详细的世界观背景..." style="min-height:120px;"></textarea></div>
        </div>
        <div class="full-modal-footer"><button class="btn-secondary" onclick="closeWorldbookModal()">取消</button><button class="btn-primary" onclick="saveWorldbook()">保存</button></div>
    </div>
    <script>
        const KEYS = { personas:'mc_p', worldbook:'mc_w', settings:'mc_s', messages:'mc_m', current:'mc_c' };
        function load(k,d){try{let v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
        function save(k,v){localStorage.setItem(k,JSON.stringify(v));}
        const defP = [
            {id:'1',name:'傲娇猫娘',prompt:'你是一只傲娇的猫娘，说话带着"哼~"、"笨蛋！"等口癖，内心关心对方但嘴上不承认。',avatar:'😺'},
            {id:'2',name:'睿智学者',prompt:'你是知识渊博的老学者，说话文雅有哲理，喜欢引用经典，耐心解答问题。',avatar:'🧙'},
            {id:'3',name:'毒舌助手',prompt:'你是毒舌但高效的AI助手，说话犀利直接，会用讽刺语气但非常可靠。',avatar:'🤖'}
        ];
        const defW = [
            {id:'1',name:'赛博朋克都市',keywords:['霓虹灯','义体','网络','黑客','企业'],content:'2077年新东京，巨型企业掌控一切，霓虹灯永不熄灭，义体改造普及。'},
            {id:'2',name:'魔法学院',keywords:['魔法','学院','法术','巫师','魔杖'],content:'隐藏在现代的魔法学院，分为四个学院，学生学习各类魔法。'}
        ];
        let personas = load(KEYS.personas, defP);
        let worldbook = load(KEYS.worldbook, defW);
        let settings = load(KEYS.settings, {apiEndpoint:'https://api.openai.com/v1/chat/completions',apiKey:'',modelName:'gpt-3.5-turbo',wallpaperUrl:'',customBubbleCSS:''});
        let curId = load(KEYS.current, null);
        let messages = load(KEYS.messages, {});

        function renderPersonas(){
            document.getElementById('persona-list').innerHTML = personas.map(p=>`
                <div class="persona-card ${p.id===curId?'active':''}" onclick="selectPersona('${p.id}')">
                    <button class="delete-btn" onclick="event.stopPropagation();delPersona('${p.id}')">×</button>
                    <div class="name">${p.avatar} ${p.name}</div>
                    <div class="desc">${p.prompt.substring(0,40)}...</div>
                </div>`).join('')||'<div style="text-align:center;color:#a0a0b0;padding:20px;font-size:0.8em;">点击下方按钮创建</div>';
        }
        function renderWorldbook(){
            document.getElementById('worldbook-list').innerHTML = worldbook.map(w=>`
                <div class="wb-card">
                    <div class="wb-name">📖 ${w.name}</div>
                    <div class="wb-keywords">${w.keywords.map(k=>`<span class="wb-keyword-tag">${k}</span>`).join('')}</div>
                    <div class="wb-actions">
                        <button class="btn-sm btn-primary" onclick="openWbModal('${w.id}')">编辑</button>
                        <button class="btn-sm btn-danger" onclick="delWorldbook('${w.id}')">删除</button>
                    </div>
                </div>`).join('')||'<div style="text-align:center;color:#a0a0b0;padding:20px;font-size:0.8em;">暂无世界书条目</div>';
        }
        function loadSettingsUI(){
            document.getElementById('api-endpoint').value=settings.apiEndpoint||'';
            document.getElementById('api-key').value=settings.apiKey||'';
            document.getElementById('model-name').value=settings.modelName||'gpt-3.5-turbo';
            document.getElementById('wallpaper-url').value=settings.wallpaperUrl||'';
            document.getElementById('custom-bubble-css').value=settings.customBubbleCSS||'';
            applyWallpaper(); applyCustomCSS();
        }
        function applyWallpaper(){
            document.body.style.backgroundImage = settings.wallpaperUrl?`url(${settings.wallpaperUrl})`:'none';
        }
        function applyCustomCSS(){
            let el=document.getElementById('cs'); if(!el){el=document.createElement('style');el.id='cs';document.head.appendChild(el);}
            el.textContent=settings.customBubbleCSS||'';
        }
        function selectPersona(id){curId=id;save(KEYS.current,id);renderPersonas();loadChat();updateHead();closeDrawer();}
        function updateHead(){
            let p=personas.find(x=>x.id===curId);
            document.getElementById('current-persona-name').textContent=p?`${p.avatar} ${p.name}`:'👤 选择角色开始对话';
            let msgs=messages[curId]||[];
            let recent=msgs.slice(-8).map(m=>m.content).join(' ').toLowerCase();
            let active=worldbook.filter(w=>w.keywords.some(k=>recent.includes(k.toLowerCase())));
            document.getElementById('world-status').textContent=active.length?`🌍 ${active.map(a=>a.name).join(', ')}`:'';
        }
        function loadChat(){
            let area=document.getElementById('chat-area');
            let msgs=messages[curId]||[];
            let p=personas.find(x=>x.id===curId);
            if(!msgs.length){area.innerHTML=`<div class="empty-state"><div class="emoji">${p?p.avatar:'💬'}</div><p>${p?'和 '+p.name+' 开始对话吧':'选择角色开始聊天'}</p></div>`;return;}
            area.innerHTML=msgs.map(m=>{
                let av=m.role==='user'?'👤':(p?p.avatar:'🤖');
                return `<div class="message ${m.role}"><div class="message-avatar">${av}</div><div class="message-bubble">${m.content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}</div></div>`;
            }).join('');
            area.scrollTop=area.scrollHeight;
        }
        function addMsg(role,content){
            if(!curId)return;
            if(!messages[curId])messages[curId]=[];
            messages[curId].push({role,content,time:Date.now()});
            if(messages[curId].length>100)messages[curId]=messages[curId].slice(-100);
            save(KEYS.messages,messages);loadChat();updateHead();
        }
        function getWbCtx(){
            if(!curId)return'';
            let msgs=messages[curId]||[];
            let recent=msgs.slice(-8).map(m=>m.content).join(' ').toLowerCase();
            let active=worldbook.filter(w=>w.keywords.some(k=>recent.includes(k.toLowerCase())));
            return active.length?'\n\n[世界观背景]\n'+active.map(a=>a.content).join('\n\n'):'';
        }
        async function sendMessage(){
            let input=document.getElementById('chat-input');
            let btn=document.getElementById('send-btn');
            let msg=input.value.trim();
            if(!msg)return;
            if(!curId){showToast('⚠️ 请先选择角色');return;}
            if(!settings.apiKey){showToast('⚠️ 请先设置API密钥');return;}
            addMsg('user',msg);input.value='';input.style.height='auto';
            let typing=document.getElementById('typing-indicator');
            typing.classList.add('active');btn.disabled=true;
            document.getElementById('chat-area').scrollTop=document.getElementById('chat-area').scrollHeight;
            try{
                let persona=personas.find(p=>p.id===curId);
                let wbCtx=getWbCtx();
                let history=(messages[curId]||[]).map(m=>({role:m.role,content:m.content}));
                let msgs=[{role:'system',content:persona.prompt+wbCtx},...history.slice(-15)];
                let resp=await fetch(settings.apiEndpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+settings.apiKey},body:JSON.stringify({model:settings.modelName,messages:msgs,temperature:0.8,max_tokens:1500})});
                if(!resp.ok){let err=await resp.json().catch(()=>({}));throw new Error(err.error?.message||'HTTP '+resp.status);}
                let data=await resp.json();
                addMsg('assistant',data.choices[0]?.message?.content||'(无响应)');
            }catch(e){addMsg('assistant','❌ '+e.message);}
            typing.classList.remove('active');btn.disabled=false;input.focus();
        }
        function clearChat(){if(!curId)return;if(!confirm('清空当前聊天记录？'))return;delete messages[curId];save(KEYS.messages,messages);loadChat();showToast('✅ 已清空');}
        function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
        function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
        function openPersonaModal(id){
            document.getElementById('persona-edit-id').value=id||'';
            document.getElementById('persona-modal-title').textContent=id?'编辑人设':'创建人设';
            if(id){let p=personas.find(x=>x.id===id);if(p){document.getElementById('persona-name').value=p.name;document.getElementById('persona-prompt').value=p.prompt;document.getElementById('persona-avatar').value=p.avatar;}}
            else{document.getElementById('persona-name').value='';document.getElementById('persona-prompt').value='';document.getElementById('persona-avatar').value='🤖';}
            document.getElementById('persona-modal').classList.add('open');
        }
        function closePersonaModal(){document.getElementById('persona-modal').classList.remove('open');}
        function savePersona(){
            let id=document.getElementById('persona-edit-id').value;
            let name=document.getElementById('persona-name').value.trim();
            let prompt=document.getElementById('persona-prompt').value.trim();
            let avatar=document.getElementById('persona-avatar').value.trim()||'🤖';
            if(!name||!prompt){showToast('请填写完整');return;}
            if(id){let i=personas.findIndex(x=>x.id===id);if(i>-1)personas[i]={...personas[i],name,prompt,avatar};}
            else{personas.push({id:Date.now().toString(),name,prompt,avatar});}
            save(KEYS.personas,personas);closePersonaModal();renderPersonas();updateHead();showToast('✅ 已保存');
        }
        function delPersona(id){if(!confirm('删除此角色及聊天记录？'))return;personas=personas.filter(x=>x.id!==id);delete messages[id];if(curId===id){curId=null;save(KEYS.current,null);}save(KEYS.personas,personas);save(KEYS.messages,messages);renderPersonas();loadChat();updateHead();}
        function openWbModal(id){
            document.getElementById('worldbook-edit-id').value=id||'';
            document.getElementById('worldbook-modal-title').textContent=id?'编辑世界条目':'添加世界条目';
            if(id){let w=worldbook.find(x=>x.id===id);if(w){document.getElementById('worldbook-name').value=w.name;document.getElementById('worldbook-keywords').value=w.keywords.join(', ');document.getElementById('worldbook-content').value=w.content;}}
            else{document.getElementById('worldbook-name').value='';document.getElementById('worldbook-keywords').value='';document.getElementById('worldbook-content').value='';}
            document.getElementById('worldbook-modal').classList.add('open');
        }
        function closeWorldbookModal(){document.getElementById('worldbook-modal').classList.remove('open');}
        function saveWorldbook(){
            let id=document.getElementById('worldbook-edit-id').value;
            let name=document.getElementById('worldbook-name').value.trim();
            let kwStr=document.getElementById('worldbook-keywords').value.trim();
            let content=document.getElementById('worldbook-content').value.trim();
            if(!name||!kwStr||!content){showToast('请填写完整');return;}
            let keywords=kwStr.split(',').map(k=>k.trim()).filter(Boolean);
            if(id){let i=worldbook.findIndex(x=>x.id===id);if(i>-1)worldbook[i]={...worldbook[i],name,keywords,content};}
            else{worldbook.push({id:Date.now().toString(),name,keywords,content});}
            save(KEYS.worldbook,worldbook);closeWorldbookModal();renderWorldbook();updateHead();showToast('✅ 已保存');
        }
        function delWorldbook(id){if(!confirm('删除此世界条目？'))return;worldbook=worldbook.filter(x=>x.id!==id);save(KEYS.worldbook,worldbook);renderWorldbook();}
        function applySettings(){
            settings={apiEndpoint:document.getElementById('api-endpoint').value.trim(),apiKey:document.getElementById('api-key').value.trim(),modelName:document.getElementById('model-name').value.trim(),wallpaperUrl:document.getElementById('wallpaper-url').value.trim(),customBubbleCSS:document.getElementById('custom-bubble-css').value.trim()};
            save(KEYS.settings,settings);applyWallpaper();applyCustomCSS();showToast('✅ 设置已保存');closeDrawer();
        }
        function resetAll(){if(!confirm('清除所有数据？不可恢复！'))return;Object.values(KEYS).forEach(k=>localStorage.removeItem(k));personas=[...defP];worldbook=[...defW];settings={apiEndpoint:'https://api.openai.com/v1/chat/completions',apiKey:'',modelName:'gpt-3.5-turbo',wallpaperUrl:'',customBubbleCSS:''};curId=null;messages={};save(KEYS.personas,personas);save(KEYS.worldbook,worldbook);save(KEYS.settings,settings);renderPersonas();renderWorldbook();loadSettingsUI();loadChat();updateHead();showToast('🗑️ 已重置');}
        function showToast(msg){let t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
        document.querySelectorAll('.drawer-tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.drawer-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('tab-'+tab.dataset.tab).classList.add('active');});});
        document.getElementById('chat-input').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
        document.getElementById('chat-input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});
        function init(){renderPersonas();renderWorldbook();loadSettingsUI();if(curId)selectPersona(curId);updateHead();}
        init();
    </script>
</body>
</html>
